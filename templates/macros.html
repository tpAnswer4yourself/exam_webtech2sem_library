{% macro book_form(book=None, genres=None) %}
<div class="mb-3">
    <label for="title" class="form-label">Название <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="title" name="title" value="{{ book.title if book else '' }}" required>
</div>

<div class="mb-3">
    <label for="short_description" class="form-label">Краткое описание <span class="text-danger">*</span></label>
    <textarea class="form-control" id="short_description"
        name="short_description">{{ book.short_description if book else '' }}</textarea>
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <label for="year" class="form-label">Год выхода <span class="text-danger">*</span></label>
        <input type="number" class="form-control" id="year" name="year" value="{{ book.year if book else '' }}"
            required>
    </div>
    <div class="col-md-6">
        <label for="pages" class="form-label">Объём (страниц) <span class="text-danger">*</span></label>
        <input type="number" class="form-control" id="pages" name="pages" value="{{ book.pages if book else '' }}"
            required>
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <label for="publisher" class="form-label">Издательство <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="publisher" name="publisher"
            value="{{ book.publisher if book else '' }}" required>
    </div>
    <div class="col-md-6">
        <label for="author" class="form-label">Автор <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="author" name="author" value="{{ book.author if book else '' }}"
            required>
    </div>
</div>

<div class="mb-3">
    <label for="genres" class="form-label">Жанры <span class="text-danger">*</span></label>
    <select class="form-select" id="genres" name="genres" multiple required>
        {% for genre in genres %}
        <option value="{{ genre.id }}" {% if book and genre in book.genres %}selected{% endif %}>
            {{ genre.name }}
        </option>
        {% endfor %}
    </select>
    <div class="form-text">Зажмите Ctrl, чтобы выбрать несколько жанров.</div>
</div>
{% endmacro %}
